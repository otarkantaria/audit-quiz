# Add this server block to the VPS host-level nginx
# or to civilgpt's nginx config (requires shared network).
#
# The quiz-api container runs on host port 8001.
# Get SSL cert: certbot certonly --standalone -d quiz.civil.ge
# (stop nginx briefly, or use webroot challenge)

upstream audit_quiz_api {
    server 127.0.0.1:8001;
}

limit_req_zone $binary_remote_addr zone=quiz_api:10m rate=10r/s;

server {
    listen 80;
    server_name quiz.civil.ge;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name quiz.civil.ge;

    ssl_certificate /etc/letsencrypt/live/quiz.civil.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quiz.civil.ge/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/ {
        limit_req zone=quiz_api burst=20 nodelay;

        proxy_pass http://audit_quiz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://audit_quiz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 5m;
}
