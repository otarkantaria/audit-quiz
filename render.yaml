services:
  - type: web
    name: audit-quiz-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/data
      - key: PYTHON_VERSION
        value: "3.11.6"
    disk:
      name: quiz-data
      mountPath: /opt/render/project/data
      sizeGB: 1
